<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Calculator</title>

<style>

/* ================= BODY ================= */
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}

/* ================= PARTICLES ================= */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* ================= APP LAYOUT ================= */
.app{
  display:flex;
  gap:20px;
}

/* ================= CALCULATOR ================= */
.calculator{
  width:340px;
  padding:20px;
  border-radius:20px;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.1);

  box-shadow:0 0 40px rgba(0,0,0,0.8);
  transition:0.2s;
}

/* ================= DISPLAY ================= */
.display{
  width:100%;
  height:80px;
  font-size:2rem;
  text-align:right;
  border:none;
  background:transparent;
  color:#fff;
  margin-bottom:10px;
}

/* ================= GRID ================= */
.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

/* ================= SCI PANEL ================= */
.scientific{
  display:none;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:10px;
}

/* ================= BUTTON ================= */
button{
  padding:15px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}

/* 💜 NEON */
button:hover{
  box-shadow:
    0 0 10px #8a2be2,
    0 0 20px #8a2be2;
}

button:active{
  transform:scale(0.9);
}

.operator{ background:#ff9500; }
.equal{ background:#00c853; }
.clear{ background:#ff3b30; }

/* ================= HISTORY ================= */
.history{
  width:200px;
  max-height:400px;
  overflow-y:auto;
  padding:15px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);

  border-radius:20px;
  color:#fff;
}

.history div{
  padding:8px;
  cursor:pointer;
}

.history div:hover{
  background:rgba(255,255,255,0.1);
}

/* ================= TOGGLE ================= */
.toggle{
  position:absolute;
  top:20px;
  left:20px;
  padding:8px 12px;
  background:#111;
  color:#fff;
  cursor:pointer;
  border-radius:10px;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="toggle" onclick="toggleSci()">🧠 Sci</div>

<div class="app">

<div class="calculator" id="calc">

<input id="display" class="display" disabled>

<!-- SCIENTIFIC -->
<div class="scientific" id="sci">
<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>
<button onclick="append('Math.tan(')">tan</button>
<button onclick="append('Math.sqrt(')">√</button>

<button onclick="append('Math.log10(')">log</button>
<button onclick="append('Math.PI')">π</button>
<button onclick="append('Math.E')">e</button>
<button onclick="append('**')">x^y</button>
</div>

<!-- BASIC -->
<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="del()">⌫</button>
<button onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<!-- HISTORY -->
<div class="history" id="history">
<h3>History</h3>
</div>

</div>

<script>

const display=document.getElementById("display");
const historyDiv=document.getElementById("history");

/* ================= CALC ================= */
function append(val){ display.value+=val; }

function clearDisplay(){ display.value=""; }

function del(){ display.value=display.value.slice(0,-1); }

function calculate(){
  try{
    let result=eval(display.value);
    addHistory(display.value+" = "+result);
    display.value=result;
  }catch{
    display.value="Error";
  }
}

/* ================= HISTORY ================= */
function addHistory(text){
  let div=document.createElement("div");
  div.textContent=text;
  div.onclick=()=> display.value=text.split("=")[0];
  historyDiv.appendChild(div);
}

/* ================= SCI TOGGLE ================= */
function toggleSci(){
  let sci=document.getElementById("sci");
  sci.style.display = sci.style.display==="grid" ? "none" : "grid";
}

/* ================= KEYBOARD ================= */
document.addEventListener("keydown",e=>{
  if((e.key>=0 && e.key<=9)||"+-*/().".includes(e.key)){
    append(e.key);
  }
  if(e.key==="Enter") calculate();
  if(e.key==="Backspace") del();
});

/* ================= 3D TILT ================= */
const calc=document.getElementById("calc");

document.addEventListener("mousemove",e=>{
  let x=(window.innerWidth/2 - e.clientX)/30;
  let y=(window.innerHeight/2 - e.clientY)/30;
  calc.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

/* ================= PARTICLES ================= */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:Math.random()-0.5,
    dy:Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
